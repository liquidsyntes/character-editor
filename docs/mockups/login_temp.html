<!DOCTYPE html>

<html class="light" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ScriptScribe - Вход в систему</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&amp;family=Source+Sans+3:wght@400;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .narrative-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(159, 172, 215, 0.15) 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error-dim": "#9f0519",
                      "on-error": "#ffefee",
                      "background": "#f6f6ff",
                      "on-secondary-container": "#0840a2",
                      "on-tertiary-fixed-variant": "#5d1673",
                      "surface-container": "#e2e7ff",
                      "surface-bright": "#f6f6ff",
                      "on-error-container": "#570008",
                      "inverse-primary": "#3591ff",
                      "tertiary-container": "#e193f6",
                      "on-surface": "#202d51",
                      "on-surface-variant": "#4d5a81",
                      "on-secondary": "#f1f2ff",
                      "primary-fixed-dim": "#3e93ff",
                      "surface-container-lowest": "#ffffff",
                      "surface-tint": "#005baf",
                      "secondary-container": "#c3d0ff",
                      "on-background": "#202d51",
                      "on-tertiary": "#ffedfe",
                      "surface-container-high": "#dae1ff",
                      "tertiary-dim": "#76318c",
                      "secondary": "#2b56b7",
                      "on-primary-container": "#002249",
                      "primary-container": "#60a1ff",
                      "primary": "#005baf",
                      "tertiary": "#833e99",
                      "surface-dim": "#c7d3ff",
                      "error-container": "#fb5151",
                      "on-secondary-fixed": "#002e7d",
                      "surface-container-low": "#eef0ff",
                      "inverse-on-surface": "#8f9cc6",
                      "outline": "#69769e",
                      "on-primary-fixed": "#000000",
                      "on-tertiary-fixed": "#2e003d",
                      "inverse-surface": "#000c2d",
                      "on-secondary-fixed-variant": "#1b4aac",
                      "secondary-fixed": "#c3d0ff",
                      "on-tertiary-container": "#53076a",
                      "on-primary": "#eff2ff",
                      "error": "#b31b25",
                      "surface": "#f6f6ff",
                      "secondary-fixed-dim": "#afc2ff",
                      "tertiary-fixed-dim": "#d286e7",
                      "secondary-dim": "#1a49ab",
                      "surface-variant": "#d2dcff",
                      "on-primary-fixed-variant": "#002c5a",
                      "surface-container-highest": "#d2dcff",
                      "primary-dim": "#004f99",
                      "primary-fixed": "#60a1ff",
                      "outline-variant": "#9facd7",
                      "tertiary-fixed": "#e193f6"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "container-padding": "32px",
                      "stack-md": "16px",
                      "stack-sm": "8px",
                      "sidebar-width": "280px",
                      "gutter": "24px",
                      "unit": "4px",
                      "stack-lg": "32px"
              },
              "fontFamily": {
                      "headline-sm": ["Source Serif 4"],
                      "headline-md": ["Source Serif 4"],
                      "body-md": ["Source Sans 3"],
                      "body-lg": ["Source Sans 3"],
                      "mono-data": ["JetBrains Mono"],
                      "display-lg": ["Source Serif 4"],
                      "label-caps": ["JetBrains Mono"]
              },
              "fontSize": {
                      "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "headline-md": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
              }
            },
          },
        }
      </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col narrative-bg">
<header class="w-full top-0 sticky bg-background border-b border-outline-variant flex justify-between items-center px-container-padding h-16 z-50">
<div class="flex items-center gap-2">
<span class="font-headline-md text-headline-md text-primary font-semibold">ScriptScribe</span>
</div>
<div class="hidden md:flex items-center gap-stack-lg">
<nav class="flex gap-stack-md">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">ВОЗМОЖНОСТИ</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">ЦЕНЫ</a>
</nav>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-container-padding py-stack-lg">
<div class="max-w-[440px] w-full flex flex-col gap-stack-lg">
<div class="flex flex-col items-center text-center gap-stack-sm mb-stack-md">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-stack-sm shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" data-icon="auto_stories">auto_stories</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Добро пожаловать</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Продолжите создание вашего шедевра</p>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-stack-lg shadow-sm">
<form class="flex flex-col gap-stack-md" id="loginForm">
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Электронная почта</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
<input class="w-full pl-10 pr-4 py-3 bg-transparent border-b-2 border-outline-variant focus:border-primary focus:ring-0 outline-none font-body-md text-body-md transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Пароль</label>
<a class="font-label-caps text-label-caps text-primary hover:underline transition-all" href="#">Забыли пароль?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock_open">lock_open</span>
<input class="w-full pl-10 pr-12 py-3 bg-transparent border-b-2 border-outline-variant focus:border-primary focus:ring-0 outline-none font-body-md text-body-md transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-stack-sm py-stack-sm">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="remember">Запомнить меня</label>
</div>
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-label-caps text-label-caps tracking-widest hover:bg-primary-dim active:scale-[0.98] transition-all shadow-md shadow-primary/10 flex items-center justify-center gap-2 group" type="submit">
                        ВОЙТИ
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-stack-lg pt-stack-lg border-t border-outline-variant flex flex-col gap-stack-md">
<p class="font-body-md text-body-md text-on-surface-variant text-center">Или войти через</p>
<div class="grid grid-cols-2 gap-stack-sm">
<button class="flex items-center justify-center gap-2 px-4 py-2 border border-outline-variant rounded-lg font-label-caps text-label-caps text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="google">google</span>
                            GOOGLE
                        </button>
<button class="flex items-center justify-center gap-2 px-4 py-2 border border-outline-variant rounded-lg font-label-caps text-label-caps text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="apple">ios</span>
                            APPLE
                        </button>
</div>
</div>
</div>
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Нет аккаунта? 
                    <a class="text-primary font-semibold hover:underline" href="#">Создать аккаунт</a>
</p>
</div>
</div>
</main>
<footer class="w-full bg-background border-t border-outline-variant flex flex-col md:flex-row justify-between items-center px-container-padding py-stack-md">
<p class="font-label-caps text-label-caps text-on-surface-variant">© 2024 SCRIPT SCRIBE TECHNOLOGIES</p>
<div class="flex gap-stack-md mt-stack-sm md:mt-0">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">Политика конфиденциальности</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">Условия использования</a>
</div>
</footer>
<script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> ВХОД...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('Имитация входа в систему...');
            }, 1500);
        });
    </script>
</body></html>
