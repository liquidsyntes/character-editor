services:
  character-editor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: character-editor
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - sqlite_data:/app/prisma/data
    environment:
      # БД (SQLite, путь внутри volume)
      - DATABASE_URL=file:/app/prisma/data/dev.db
      # NextAuth (обязательно поменять секрет)
      - NEXTAUTH_URL=http://localhost:4000
      - NEXTAUTH_SECRET=change-me-to-random-string
      # AI-провайдеры (опционально — укажите ключи которые используете)
      # - DEEPSEEK_API_KEY=sk-...
      # - OPENAI_API_KEY=sk-...
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - GEMINI_API_KEY=...
      # - XAI_API_KEY=...
      # - OPENROUTER_API_KEY=...
    # Или создайте .env файл и используйте:
    # env_file:
    #   - .env

volumes:
  sqlite_data:
